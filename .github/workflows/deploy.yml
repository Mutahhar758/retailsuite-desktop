name: Deploy Desktop App (ClickOnce) to IIS

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore RetailSuite.Desktop.sln
      working-directory: ./

    - name: Publish ClickOnce Application
      run: msbuild ERP/ERP.csproj /target:publish /p:Configuration=Release /p:Platform=x86 /p:ApplicationVersion="1.0.0.${{ github.run_number }}"
      working-directory: ./

    - name: Deploy ClickOnce Files to IIS
      shell: powershell
      run: |
        # Ensure destination folder exists
        New-Item -ItemType Directory -Force -Path "D:\Websites\RetailSuite_Desktop"
        
        # Copy the ClickOnce publish files to the deployment folder
        Copy-Item -Path "./ERP/bin/Release/app.publish/*" -Destination "D:\Websites\RetailSuite_Desktop" -Recurse -Force
      working-directory: ./
